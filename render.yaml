# Render 배포 설정 (Blueprint)
# 이 파일이 있으면 Render에서 "New + → Blueprint"로 한 번에 배포할 수 있어요.
# 영구 디스크(disk)를 /var/data 에 마운트하고, DATA_DIR 로 SQLite 저장 위치를 지정합니다.
services:
  - type: web
    name: nyangsalpim
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATA_DIR
        value: /var/data
    disk:
      name: nyangsalpim-data
      mountPath: /var/data
      sizeGB: 1
