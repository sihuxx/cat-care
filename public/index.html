<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#12131c" />
  <title>냥살핌 · 길고양이 돌봄 통합 관리 플랫폼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- 야간 배경: 길고양이가 다니는 밤거리 -->
  <div class="sky" aria-hidden="true">
    <span class="moon"></span>
    <span class="star" style="--x:12%;--y:18%;--d:0s"></span>
    <span class="star" style="--x:28%;--y:9%;--d:1.1s"></span>
    <span class="star" style="--x:67%;--y:14%;--d:2.2s"></span>
    <span class="star" style="--x:82%;--y:22%;--d:0.6s"></span>
    <span class="star" style="--x:45%;--y:6%;--d:1.7s"></span>
  </div>

  <!-- 앱 셸 (모바일 프레임) -->
  <div class="phone">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">🐾</span>
        <div class="brand-text">
          <strong>냥살핌</strong>
          <small>우리 동네 길고양이 돌봄</small>
        </div>
      </div>
      <button class="ghost-btn" id="aboutBtn" title="서비스 소개">ⓘ</button>
    </header>

    <main id="view" class="view"><!-- 탭 콘텐츠 --></main>

    <!-- 하단 탭바 -->
    <nav class="tabbar" id="tabbar">
      <button data-tab="map" class="tab active">
        <span class="ic">🗺️</span><span>지도</span>
      </button>
      <button data-tab="feed" class="tab">
        <span class="ic">🍚</span><span>급식</span>
      </button>
      <button data-tab="register" class="tab tab-cta">
        <span class="plus">＋</span>
      </button>
      <button data-tab="care" class="tab">
        <span class="ic">🩺</span><span>돌봄</span>
      </button>
      <button data-tab="board" class="tab">
        <span class="ic">📊</span><span>현황</span>
      </button>
    </nav>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- 모달 -->
  <div id="modal" class="modal-wrap" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal" role="dialog" aria-modal="true"><div id="modalBody"></div></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
